<!DOCTYPE html>
<html>

<head>
  <title>Yunseo Park | UI Design Programming 1</title>
  <meta charset="utf-8" />
  <link rel="stylesheet" type="text/css" href="assets/style.css">
</head>

<body>

<div class="wrap">


  <!-- background -->
  <div class="bg back"></div>
  <div class="bg front"><img src="assets/bgbg.png" style="height: 800px; margin-top: -180px;"></div>

  <!-- box_top -->
  <div class="box-top">
    <div class="box-top-text">
      Yunseo Park <span>Lv.100</span>
      <div class="hp1">
      </div>
    </div>
  </div>

  <!-- character -->
  <img class="character" src="https://static.wikia.nocookie.net/pokemon/images/3/30/%EA%B8%80%EB%A0%88%EC%9D%B4%EC%8B%9C%EC%95%84_%EA%B3%B5%EC%8B%9D_%EC%9D%BC%EB%9F%AC%EC%8A%A4%ED%8A%B8.png/revision/latest?cb=20170730120630&path-prefix=ko">

  <!-- box_bottom -->
  <div class="box-bottom-shadow">
  <div class="box-bottom">
    <div class="box-bottom-text1">
      UI Design<span>Lv.100</span>
    </div>
    <div class="hp2"></div>
    <div class="box-bottom-text2">
      <span class="box-bottom-text2_t">Programming</span>
      <div class="bar small inline">
      </div>
    </div>
  </div>
  </div>

  <!-- menu -->
  <div class="menu">
    <a target="_blank" href="index.html" class="btn">
      <span>About Me</span>
      <img src="assets/icon3.svg" style="margin-top: 19px;">
    </a>

    <a target="_blank" href="exercise.html" class="btn red">
      <span>Exercise</span>
      <img src="assets/icon4.svg" style="margin-bottom: 5px;">
    </a>

    <a target="_blank" href="project.html" class="btn orange">
      <span>Project</span>
      <img src="assets/icon2.svg" style="margin-bottom: 15px;">
    </a>

    <a href="exit.html" class="btn purple exit">
     <span>Exit</span>
     <img src="assets/icon1.svg">
    </a>
  </div>

  <!-- loading -->
  <div class="loading-overlay">
    <div class="spinner"></div>
  </div>

<script>
const buttons = document.querySelectorAll('.btn');
const loader = document.querySelector('.loading-overlay');

buttons.forEach(btn => {
  if (btn.classList.contains('exit')) return;

  btn.addEventListener('click', function(e) {
    e.preventDefault();

    const link = this.getAttribute('href');

    this.classList.add('clicked');

    setTimeout(() => {
      loader.classList.add('active');
    }, 150);

    setTimeout(() => {
      window.open(link, '_blank');
    }, 800);

    setTimeout(() => {
      loader.classList.remove('active');
    }, 1000);
  });
});
</script>


</div>

</body>

</html>
