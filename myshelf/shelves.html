<!DOCTYPE html>
<html>

<head>
	<title>CSS Grid</title>
	<meta charset="utf-8" />
	<link rel="stylesheet" href="shelves.css" type="text/css" />
</head>

<body>

	<h1>Yunseo's Shelf<br />Book Collection</h1>
	<h2>
		<a href="javascript:window.close();">
        <pre style="font-family: Helvetica; margin: 10px 15px 10px 15px;">Exit</pre>
      </a>
	</h2>

	<div id="bookcase">
		<div class="shelf">
			<img src="img/slaim.png" style="width: 32px; height: auto;"
				 onclick="openModal(this)" data-title="나의 라임오렌지 나무" data-description="My Sweet Orange Tree" />
			<img src="img/s1984.jpg" style="width: 35px; height: auto;"
				 onclick="openModal(this)" data-title="1984" data-description="1984" />
			<img src="img/sur.jpg" style="width: 160px; height: auto;"
			     onclick="openModal(this)" data-title="수레바퀴 아래서" data-description="Beneath the Wheel" />
			<img src="img/aml.jpg" style="width: 218px; height: auto;"
			     onclick="openModal(this)" data-title="동물농장" data-description="Animal Farm" />
			<img src="img/sfest.png" style="width: 42px; height: auto;"
			     onclick="openModal(this)" data-title="페스트" data-description="Feste" />
		</div>

		<div class="shelf">
			<img src="img/snan.png" style="width: 39px; height: auto;"
			     onclick="openModal(this)" data-title="난장이가 쏘아올린 작은 공" data-description="The Dwarf" />
			<img src="img/awa.jpg" style="width: 215px; height: auto;"
			     onclick="openModal(this)" data-title="어린 왕자" data-description="The Little Prince" />
			<img src="img/dem.jpg" style="width: 195px; height: auto;"
			     onclick="openModal(this)" data-title="데미안" data-description="Demian" />
		</div>

		<div class="shelf">
			<img src="img/mos.jpg" style="width: 227px; height: auto;"
			     onclick="openModal(this)" data-title="모순" data-description="Mosun(Contradiction)" />
			<img src="img/naso.jpg" style="width: 225px; height: auto;"
			     onclick="openModal(this)" data-title="나는 소망한다 내게 금지된 것을" data-description="I Wish For What Is Forbidden To Me" />
			<img src="img/sin.jpg" style="width: 235px; height: auto;"
			     onclick="openModal(this)" data-title="그 많던 싱아는 누가 다 먹었을까" data-description="Who Ate Up All the Shinga?" />
		</div>

		<div class="shelf">
			<img src="img/des.jpg" style="width: 225px; height: auto;"
			     onclick="openModal(this)" data-title="인간을 위한 디자인" data-description="Design for the Real World" />
			<img src="img/won.jpg" style="width: 195px; height: auto;"
			     onclick="openModal(this)" data-title="원미동 사람들" data-description="The Poet of Wonmi-dong" />
			<img src="img/bel.jpg" style="width: 135px; height: auto;"
			     onclick="openModal(this)" data-title="하늘과 바람과 별과 시" data-description="Heaven and Wind and Stars and Poems" />
			<img src="img/has.jpg" style="width: 195px; height: auto;"
			     onclick="openModal(this)" data-title="해산바가지" data-description="Haesanbagaji(The Gourd for Childbirth)" />
		</div>

	
	<div id="overlay" onclick="closeModal()">
		<div id="modal" onclick="event.stopPropagation()">
			<span onclick="closeModal()">✕</span>
			<img id="modal-img" src="">
			<h3 id="modal-title"></h3>
			<p id="modal-desc"></p>
		</div>
	</div>

	<script>
		function openModal(book) {
			document.getElementById("modal-img").src = book.src;
			document.getElementById("modal-title").innerText = book.dataset.title;
			document.getElementById("modal-desc").innerText = book.dataset.description;
			document.getElementById("overlay").style.display = "flex";
		}

		function closeModal() {
			document.getElementById("overlay").style.display = "none";
		}
	</script>
</body>
</html>
